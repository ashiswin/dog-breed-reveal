<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard – Dog Breed Reveal</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
<style>
.top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--s-xl); flex-wrap: wrap; gap: var(--s-md); }
.top-bar h1 { font-size: 1.8rem; display: flex; align-items: center; gap: var(--s); }
.top-bar h1 svg { width: 28px; height: 28px; }
.dog-row { display: flex; align-items: center; gap: var(--s); margin-bottom: var(--s); }
.dog-row input { flex: 1; }
</style></head><body>
<div class="container">
<div class="top-bar">
  <h1><svg viewBox="0 0 24 24" fill="none" stroke="#8B5E3C" stroke-width="2"><path d="M12 2L15 8l6 1-4 4 1 6-5-3-5 3 1-6-4-4 6-1z"/></svg> My Reveal Parties</h1>
  <div style="display:flex;align-items:center;gap:var(--s-md)">
    <span id="userName" style="font-weight:700;opacity:.7;"></span>
    <button class="btn btn-ghost btn-sm" onclick="logout()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg> Log out</button>
  </div>
</div>

<button class="btn btn-primary" onclick="openCreate()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;height:18px"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> New Reveal Party</button>

<div id="partyList" class="mt-16"></div>
</div>

<div class="modal-overlay" id="createModal">
<div class="modal">
  <h3>Create New Party</h3>
  <div class="form-group">
    <label>Dog Names</label>
    <div id="dogNameList">
      <div class="dog-row"><input type="text" class="dog-name" placeholder="Dog name"></div>
    </div>
    <button class="btn btn-outline mt-8" onclick="addDogRow()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Add another dog</button>
  </div>
  <div class="form-group">
    <label>Custom URL Slug (optional)</label>
    <input type="text" id="partySlug" placeholder="e.g. my-party">
  </div>
  <p id="createError" class="text-error" style="display:none;"></p>
  <div class="modal-actions">
    <button class="btn btn-primary" onclick="doCreate()" style="flex:1;">Create</button>
    <button class="btn btn-ghost" onclick="closeCreate()" style="flex:1;">Cancel</button>
  </div>
</div>
</div>

<script src="/app.js"></script>
<script>
var token = localStorage.getItem("token");
if (!token) window.location.href = "/";
var hdrs = App.headers();

function esc(s) { return App.esc(s); }
function logout() { localStorage.removeItem("token"); window.location.href = "/"; }
function openCreate() { document.getElementById("createModal").classList.add("show"); }
function closeCreate() { document.getElementById("createModal").classList.remove("show"); }

function addDogRow() {
  var list = document.getElementById("dogNameList");
  var row = document.createElement("div"); row.className = "dog-row";
  row.innerHTML = '<input type="text" class="dog-name" placeholder="Dog name"><button class="btn btn-danger btn-sm rm-btn" style="border-radius:50%;width:28px;height:28px;padding:0;">×</button>';
  row.querySelector(".rm-btn").onclick = function() { row.remove(); };
  list.appendChild(row);
}

async function doCreate() {
  var inputs = document.querySelectorAll(".dog-name"), dogs = [];
  for (var i = 0; i < inputs.length; i++) { var n = inputs[i].value.trim(); if (n) dogs.push({ name: n }); }
  var slug = document.getElementById("partySlug").value.trim(), err = document.getElementById("createError");
  if (!dogs.length) { err.textContent = "Enter at least one dog name"; err.style.display = "block"; return; }
  err.style.display = "none";
  try {
    var res = await fetch("/api/parties", { method: "POST", headers: hdrs, body: JSON.stringify({ dogs: dogs, slug: slug || undefined }) });
    var data = await res.json();
    if (!res.ok) { err.textContent = data.error; err.style.display = "block"; return; }
    closeCreate();
    document.querySelectorAll(".dog-name").forEach(function(i) { i.value = ""; });
    document.getElementById("partySlug").value = "";
    var rows = document.querySelectorAll("#dogNameList .dog-row");
    for (var i = 1; i < rows.length; i++) rows[i].remove();
    load();
  } catch(e) { err.textContent = "Connection failed. Try logging out and back in."; err.style.display = "block"; }
}

async function load() {
  try {
    var meRes = await fetch("/api/auth/me", { headers: hdrs });
    if (!meRes.ok) { logout(); return; }
    var me = await meRes.json();
    document.getElementById("userName").textContent = me.name || me.email;
    var parties = await fetch("/api/parties", { headers: hdrs }).then(function(r) { return r.json(); });
    var list = document.getElementById("partyList");
    if (!parties.length) {
      list.innerHTML = '<div class="empty-state"><span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg></span><p>No parties yet! Create one above.</p></div>';
      return;
    }
    list.innerHTML = parties.map(function(p) {
      var names = (p.dogs || []).map(function(d) { return d.name; }).join(" & ") || "Dogs";
      return '<div class="party-card"><div class="party-icon">🐶</div><div class="party-info"><h3>' + esc(names) + '</h3><div class="meta">' + p.guessCount + ' guesses · ' + (p.revealed ? 'Revealed' : 'Not revealed') + ' · ' + p.slug + '</div></div>' +
        '<div class="party-actions">' +
        '<a href="/p/' + p.slug + '" class="btn btn-secondary btn-sm"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg> Guess</a>' +
        '<a href="/p/' + p.slug + '/admin" class="btn btn-primary btn-sm"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg> Admin</a>' +
        '<a href="/p/' + p.slug + '/slideshow" class="btn btn-secondary btn-sm"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg> Reveal</a>' +
        '<a href="/p/' + p.slug + '/qr" class="btn btn-primary btn-sm"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg> QR</a>' +
        '<button class="btn btn-danger btn-sm db" data-slug="' + p.slug + '"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg></button>' +
        '</div></div>';
    }).join("");
    list.querySelectorAll(".db").forEach(function(b) {
      b.addEventListener("click", async function() {
        if (!confirm("Delete this party?")) return;
        await fetch("/api/parties/" + b.dataset.slug, { method: "DELETE", headers: hdrs });
        load();
      });
    });
  } catch(e) { document.getElementById("partyList").innerHTML = '<div class="empty-state"><p class="text-error">Failed to load. Try logging out and back in.</p></div>'; }
}

load();
</script>
</body></html>
