<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard – Dog Breed Reveal</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}:root{--gold:#F5A623;--brown:#8B5E3C;--coral:#FF6B6B;--teal:#4ECDC4;--green:#7BC67E;--dark:#3D2B1F}body{font-family:'Nunito',sans-serif;background:#faf5ed;min-height:100vh;color:var(--dark)}.container{max-width:700px;margin:0 auto;padding:20px}.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px}.top-bar h1{font-family:'Fredoka One',cursive;font-size:1.8rem;color:var(--brown)}.top-bar .user-info{font-weight:700;opacity:.7}.btn{padding:10px 20px;border:none;border-radius:14px;font-family:'Nunito',sans-serif;font-weight:700;font-size:.9rem;cursor:pointer;transition:transform .2s;text-decoration:none;display:inline-block}.btn:hover{transform:translateY(-1px)}.btn-primary{background:linear-gradient(135deg,var(--gold),#E8961A);color:white}.btn-teal{background:var(--teal);color:white}.btn-danger{background:var(--coral);color:white}.btn-outline{background:transparent;border:2px solid #ccc;color:#888;padding:8px 16px}.party-card{background:white;border-radius:18px;padding:20px 24px;box-shadow:0 4px 15px rgba(0,0,0,.06);margin-bottom:14px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}.party-icon{font-size:36px}.party-info{flex:1;min-width:0}.party-info h3{font-family:'Fredoka One',cursive;font-size:1.15rem;color:var(--brown);margin-bottom:2px}.party-info .meta{font-size:.8rem;color:#999}.party-actions{display:flex;gap:6px;flex-wrap:wrap}.empty-state{text-align:center;padding:60px 20px;color:#bbb}.empty-state .big{font-size:60px;display:block;margin-bottom:12px}.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:10;display:flex;align-items:center;justify-content:center;display:none}.modal-overlay.active{display:flex}.modal{background:white;border-radius:20px;padding:28px;max-width:440px;width:90%}.modal h3{font-family:'Fredoka One',cursive;color:var(--brown);margin-bottom:16px}.form-group{margin-bottom:14px}.form-group label{display:block;font-weight:700;color:var(--brown);margin-bottom:4px;font-size:.85rem}.form-group input{width:100%;padding:12px 16px;border:2px solid #E8D5C4;border-radius:12px;font-family:'Nunito',sans-serif;font-size:1rem;background:#FFFBF5}.form-group input:focus{outline:none;border-color:var(--gold)}.dog-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}.dog-row input{flex:1}.dog-row .rm-btn{width:30px;height:30px;border:none;background:#FFF0F0;color:var(--coral);border-radius:50%;font-size:1rem;cursor:pointer;font-weight:700;display:flex;align-items:center;justify-content:center}.dog-row .rm-btn:hover{background:var(--coral);color:white}.add-dog-btn{background:transparent;border:2px dashed var(--gold);border-radius:20px;padding:6px 14px;font-weight:700;font-size:.8rem;color:var(--gold);cursor:pointer;margin-top:4px}.add-dog-btn:hover{background:rgba(245,166,35,.08)}</style></head><body>
<div class="container">
<div class="top-bar"><h1>🐾 My Reveal Parties</h1><span class="user-info" id="userName"></span><button class="btn btn-outline" id="logoutBtn">Log out</button></div>
<button class="btn btn-primary" id="createBtn">＋ New Reveal Party</button>
<div id="partyList" style="margin-top:20px;"></div></div>
<div class="modal-overlay" id="createModal"><div class="modal">
<h3>Create New Party</h3>
<div class="form-group"><label>Dog Names</label><div id="dogNames"><div class="dog-row"><input type="text" class="dog-name" placeholder="Dog name" style="flex:1;"></div></div><button class="add-dog-btn" id="addDogBtn">＋ Add another dog</button></div>
<div class="form-group"><label>Custom URL Slug (optional)</label><input type="text" id="partySlug" placeholder="e.g. my-party"></div>
<div style="display:flex;gap:8px;"><button class="btn btn-primary" id="confirmCreate" style="flex:1;">Create</button><button class="btn btn-outline" id="cancelCreate" style="flex:1;">Cancel</button></div>
</div></div>
<script>
const token=localStorage.getItem("token");if(!token)window.location.href="/";
const headers={"Content-Type":"application/json","Authorization":"Bearer "+token};
async function load(){try{const me=await fetch("/api/auth/me",{headers}).then(r=>r.json());document.getElementById("userName").textContent=me.name||me.email;const parties=await fetch("/api/parties",{headers}).then(r=>r.json());const list=document.getElementById("partyList");if(!parties.length){list.innerHTML='<div class="empty-state"><span class="big">🎉</span><p>No parties yet! Create one above.</p></div>';return}
list.innerHTML=parties.map(p=>{const names=(p.dogs||[]).map(d=>d.name).join(" & ")||"Dogs";return`<div class="party-card"><div class="party-icon">🐶</div><div class="party-info"><h3>${esc(names)}</h3><div class="meta">${p.guessCount} guesses · ${p.revealed?'Revealed':'Not revealed'} · ${p.slug}</div></div><div class="party-actions"><a href="/p/${p.slug}" class="btn btn-teal">Guess</a><a href="/p/${p.slug}/admin" class="btn btn-primary">Admin</a><a href="/p/${p.slug}/slideshow" class="btn btn-teal">Reveal</a><a href="/p/${p.slug}/qr" class="btn btn-primary">QR</a><button class="btn btn-danger del-btn" data-slug="${p.slug}">🗑️</button></div></div>`}).join("");list.querySelectorAll(".del-btn").forEach(b=>b.addEventListener("click",async()=>{if(!confirm("Delete?"))return;await fetch("/api/parties/"+b.dataset.slug,{method:"DELETE",headers});load()}))}catch{window.location.href="/"}}load();
document.getElementById("logoutBtn").addEventListener("click",()=>{localStorage.removeItem("token");window.location.href="/"});
document.getElementById("createBtn").addEventListener("click",()=>document.getElementById("createModal").classList.add("active"));
document.getElementById("cancelCreate").addEventListener("click",()=>document.getElementById("createModal").classList.remove("active"));
document.getElementById("addDogBtn").addEventListener("click",()=>{const c=document.getElementById("dogNames");const r=document.createElement("div");r.className="dog-row";r.innerHTML='<input type="text" class="dog-name" placeholder="Dog name" style="flex:1;"><button class="rm-btn">×</button>';r.querySelector(".rm-btn").addEventListener("click",()=>r.remove());c.appendChild(r)});
document.getElementById("confirmCreate").addEventListener("click",async()=>{const dogs=Array.from(document.querySelectorAll(".dog-name")).map(i=>({name:i.value.trim()})).filter(d=>d.name);const slug=document.getElementById("partySlug").value.trim();if(!dogs.length)return alert("At least one dog name");const res=await fetch("/api/parties",{method:"POST",headers,body:JSON.stringify({dogs,slug:slug||undefined})});if(!res.ok){alert((await res.json()).error);return}document.getElementById("createModal").classList.remove("active");document.querySelectorAll(".dog-name").forEach(i=>i.value="");document.getElementById("partySlug").value="";document.querySelectorAll("#dogNames .dog-row:not(:first-child)").forEach(r=>r.remove());load()});
function esc(s){const d=document.createElement("div");d.textContent=s;return d.innerHTML}
</script></body></html>
