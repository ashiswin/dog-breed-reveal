<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cast Your Vote! – Dog Breed Reveal</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}:root{--gold:#F5A623;--brown:#8B5E3C;--cream:#FFF8E7;--coral:#FF6B6B;--teal:#4ECDC4;--dark:#3D2B1F}body{font-family:'Nunito',sans-serif;background:linear-gradient(160deg,#FFF8E7,#FFECD2,#FFF3E0);min-height:100vh;color:var(--dark);overflow:hidden;display:flex;align-items:center;justify-content:center;position:relative}.paw-bg{position:fixed;pointer-events:none;z-index:0;opacity:.06;font-size:70px}.paw-bg:nth-child(1){top:5%;left:5%;transform:rotate(-15deg)}.paw-bg:nth-child(2){top:15%;right:8%;transform:rotate(25deg);font-size:50px}.paw-bg:nth-child(3){top:40%;left:3%;transform:rotate(10deg);font-size:55px}.paw-bg:nth-child(4){top:60%;right:5%;transform:rotate(-20deg);font-size:48px}.paw-bg:nth-child(5){bottom:10%;left:8%;transform:rotate(30deg);font-size:40px}.splash-card{position:relative;z-index:2;text-align:center;background:white;border-radius:32px;padding:48px 40px;box-shadow:0 8px 50px rgba(0,0,0,.1);border:4px dashed rgba(245,166,35,.2);max-width:480px;margin:20px}.emoji-row{font-size:48px;margin-bottom:8px;animation:bounce 1.5s ease-in-out infinite alternate}@keyframes bounce{0%{transform:translateY(0)}100%{transform:translateY(-10px)}}.title{font-family:'Fredoka One',cursive;font-size:2.4rem;color:var(--brown);line-height:1.2;margin-bottom:8px}.subtitle{font-size:1.1rem;color:var(--brown);opacity:.7;margin-bottom:28px;font-weight:600}.qr-wrap{display:inline-block;padding:20px;background:white;border-radius:24px;box-shadow:0 4px 30px rgba(0,0,0,.08);border:3px solid #F0E0CC}.qr-wrap img{display:block;width:260px;height:260px}.url-text{margin-top:20px;font-weight:700;font-size:1.05rem;color:var(--teal);word-break:break-all}.url-text a{color:var(--teal);text-decoration:none}.footer-note{margin-top:16px;font-size:.85rem;color:var(--brown);opacity:.5}.nav-link{display:inline-block;margin-top:20px;padding:8px 20px;border-radius:14px;text-decoration:none;font-weight:700;font-size:.85rem;color:var(--brown);background:rgba(245,166,35,.1)}.nav-link:hover{background:var(--gold);color:white}.bdog{position:fixed;z-index:1;pointer-events:none;width:120px;height:120px;border-radius:50%;object-fit:cover;border:4px solid white;box-shadow:0 6px 30px rgba(0,0,0,.2)}.bdog.placeholder{display:flex;align-items:center;justify-content:center;font-size:60px;background:rgba(245,166,35,.1);border:4px solid rgba(245,166,35,.3)}@keyframes dogFloat{0%{transform:translate(0,0)rotate(-3deg)scale(1)}25%{transform:translate(-60px,-70px)rotate(5deg)scale(1.05)}50%{transform:translate(-40px,-20px)rotate(-5deg)scale(.95)}75%{transform:translate(-70px,-60px)rotate(-2deg)scale(1.03)}100%{transform:translate(0,0)rotate(-3deg)scale(1)}}@media(max-width:500px){.splash-card{padding:32px 20px}.title{font-size:1.8rem}.qr-wrap img{width:200px;height:200px}.bdog{width:80px;height:80px}.bdog.placeholder{font-size:45px}}</style></head><body>
<div class="paw-bg">🐾</div><div class="paw-bg">🐾</div><div class="paw-bg">🐾</div><div class="paw-bg">🐾</div><div class="paw-bg">🐾</div>
<div id="dogPhotos"></div>
<div class="splash-card" id="card"><div class="emoji-row">🐶 🐕 🐩 🐕‍🦺</div><h1 class="title">Cast Your<br>Vote Here!</h1><p class="subtitle">Scan the QR code to guess the breeds</p><div class="qr-wrap" id="qr-wrap"></div><p class="url-text" id="url-text"></p><p class="footer-note">🐾 Open your camera and point it at the QR code</p><a href="/dashboard" class="nav-link">← Dashboard</a></div>
<script>
const slug=window.location.pathname.split("/p/")[1]?.split("/")[0];const guessUrl=`${window.location.origin}/p/${slug}`;
document.getElementById("qr-wrap").innerHTML=`<img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(guessUrl)}&margin=10" width="300" height="300">`;
document.getElementById("url-text").innerHTML=`<a href="${guessUrl}">${guessUrl.replace("https://","")}</a>`;
const PHOTOS_KEY=["#F5A623","#4ECDC4","#7BC67E","#E87D7D","#9B7ED8","#4A90D9"];
async function load(){try{const r=await fetch(`/api/parties/${slug}/guesses`);const d=await r.json();const dogs=d.dogs||[];renderPhotos(dogs);try{const token=localStorage.getItem("token");if(token){const ar=await fetch(`/api/parties/${slug}/answers`,{headers:{"Authorization":"Bearer "+token}}).then(r=>r.json());if(ar.answers&&ar.answers.dogs)renderPhotos(dogs,ar.answers.dogs)}}catch{}}catch{renderPhotos([{name:"Dog"}])}}
function renderPhotos(dogs,answers){const c=document.getElementById("dogPhotos");c.innerHTML="";dogs.forEach((dog,i)=>{const img=answers&&answers[i]&&answers[i].image;const el=document.createElement(img?"img":"div");el.className="bdog"+(img?"":" placeholder");if(img)el.src=img;else el.textContent="🐶";c.appendChild(el);const label=document.createElement("div");label.style.cssText="position:fixed;z-index:1;pointer-events:none;font-family:'Fredoka One',cursive;font-size:.9rem;color:var(--brown);text-align:center;text-shadow:0 2px 8px rgba(255,255,255,.8)";label.textContent=dog.name||"Dog "+(i+1);c.appendChild(label);positionDog(el,label,i,dogs.length)});document.addEventListener("DOMContentLoaded",()=>applyPositions(dogs.length))}
function positionDog(el,label,i,total){const card=document.getElementById("card");const rect=card.getBoundingClientRect();const vw=window.innerWidth;const side=i%2===0?"left":"right";const offset=i*20;if(side==="left"){el.style.left=Math.max(10,rect.left-160-offset)+"px";el.style.top=(rect.top+rect.height/(total+1)*(i+1)-60)+"px"}else{el.style.left=Math.min(vw-170,rect.right+30+offset)+"px";el.style.top=(rect.top+rect.height/(total+1)*(i+1)-60)+"px"}label.style.left=(parseInt(el.style.left)+20)+"px";label.style.top=(parseInt(el.style.top)+130)+"px";el.style.animation=`dogFloat ${5+i*2}s ease-in-out infinite`;label.style.animation=`dogFloat ${5+i*2}s ease-in-out infinite`}
function applyPositions(total){document.querySelectorAll(".bdog").forEach((el,i)=>{if(el.style.left)return;positionDog(el,el.nextElementSibling,i,total)})}
window.addEventListener("resize",load);load();
</script></body></html>
