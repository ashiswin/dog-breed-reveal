<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cast Your Vote! – Dog Breed Reveal</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--gold:#F5A623;--brown:#8B5E3C;--cream:#FFF8E7;--coral:#FF6B6B;--teal:#4ECDC4;--dark:#3D2B1F}
    body{font-family:'Nunito',sans-serif;background:linear-gradient(160deg,#FFF8E7,#FFECD2,#FFF3E0);min-height:100vh;color:var(--dark);overflow:hidden;display:flex;align-items:center;justify-content:center;position:relative}
    .paw-bg{position:fixed;pointer-events:none;z-index:0;opacity:.06;font-size:70px;user-select:none}
    .paw-bg:nth-child(1){top:5%;left:5%;transform:rotate(-15deg)}.paw-bg:nth-child(2){top:15%;right:8%;transform:rotate(25deg);font-size:50px}
    .paw-bg:nth-child(3){top:40%;left:3%;transform:rotate(10deg);font-size:55px}.paw-bg:nth-child(4){top:60%;right:5%;transform:rotate(-20deg);font-size:48px}
    .paw-bg:nth-child(5){bottom:10%;left:8%;transform:rotate(30deg);font-size:40px}.paw-bg:nth-child(6){bottom:20%;right:12%;transform:rotate(-10deg);font-size:60px}
    .splash-card{position:relative;z-index:2;text-align:center;background:white;border-radius:32px;padding:48px 40px;box-shadow:0 8px 50px rgba(0,0,0,.1);border:4px dashed rgba(245,166,35,.2);max-width:480px;margin:20px}
    .emoji-row{font-size:48px;margin-bottom:8px;animation:bounce 1.5s ease-in-out infinite alternate}
    @keyframes bounce{0%{transform:translateY(0)}100%{transform:translateY(-10px)}}
    .title{font-family:'Fredoka One',cursive;font-size:2.4rem;color:var(--brown);line-height:1.2;margin-bottom:8px}
    .subtitle{font-size:1.1rem;color:var(--brown);opacity:.7;margin-bottom:28px;font-weight:600}
    .qr-wrap{display:inline-block;padding:20px;background:white;border-radius:24px;box-shadow:0 4px 30px rgba(0,0,0,.08);border:3px solid #F0E0CC}
    .qr-wrap img{display:block;width:260px;height:260px}
    .url-text{margin-top:20px;font-weight:700;font-size:1.05rem;color:var(--teal);word-break:break-all}
    .url-text a{color:var(--teal);text-decoration:none}
    .footer-note{margin-top:16px;font-size:.85rem;color:var(--brown);opacity:.5}
    .nav-link{display:inline-block;margin-top:20px;padding:8px 20px;border-radius:14px;text-decoration:none;font-weight:700;font-size:.85rem;color:var(--brown);background:rgba(245,166,35,.1)}
    .nav-link:hover{background:var(--gold);color:white}
    .bouncing-dog{position:fixed;z-index:1;pointer-events:none;user-select:none;width:130px;height:130px;border-radius:50%;object-fit:cover;border:4px solid white;box-shadow:0 6px 30px rgba(0,0,0,.2)}
    .bouncing-dog.placeholder{display:flex;align-items:center;justify-content:center;font-size:70px;background:rgba(245,166,35,.1);border:4px solid rgba(245,166,35,.3)}
    .dog-label{position:fixed;z-index:1;pointer-events:none;user-select:none;font-family:'Fredoka One',cursive;font-size:1.1rem;color:var(--brown);text-align:center;text-shadow:0 2px 8px rgba(255,255,255,.8)}
    @keyframes fifiFloat{0%{transform:translate(0,0)rotate(-3deg)scale(1)}15%{transform:translate(-40px,-70px)rotate(5deg)scale(1.08)}30%{transform:translate(-80px,-20px)rotate(-8deg)scale(.95)}45%{transform:translate(-30px,-90px)rotate(2deg)scale(1.05)}60%{transform:translate(-70px,-40px)rotate(-5deg)scale(.92)}75%{transform:translate(-20px,-80px)rotate(8deg)scale(1.1)}90%{transform:translate(-60px,-10px)rotate(-2deg)scale(.98)}100%{transform:translate(0,0)rotate(-3deg)scale(1)}}
    @keyframes snowyFloat{0%{transform:translate(0,0)rotate(2deg)scale(1)}12%{transform:translate(35px,-60px)rotate(-6deg)scale(1.07)}25%{transform:translate(70px,-30px)rotate(10deg)scale(.93)}38%{transform:translate(50px,-85px)rotate(-3deg)scale(1.06)}50%{transform:translate(80px,-15px)rotate(4deg)scale(.96)}62%{transform:translate(25px,-75px)rotate(-8deg)scale(1.09)}75%{transform:translate(60px,-50px)rotate(1deg)scale(.94)}88%{transform:translate(40px,-70px)rotate(7deg)scale(1.04)}100%{transform:translate(0,0)rotate(2deg)scale(1)}}
    @media(max-width:500px){.splash-card{padding:32px 20px}.title{font-size:1.8rem}.qr-wrap img{width:200px;height:200px}.bouncing-dog{width:80px;height:80px}.bouncing-dog.placeholder{font-size:45px}}
  </style>
</head>
<body>
  <div class="paw-bg">🐾</div><div class="paw-bg">🐾</div><div class="paw-bg">🐾</div><div class="paw-bg">🐾</div><div class="paw-bg">🐾</div><div class="paw-bg">🐾</div>

  <img class="bouncing-dog" id="fifi-photo" src="" style="display:none;">
  <div class="bouncing-dog placeholder" id="fifi-placeholder">🐶</div>
  <div class="dog-label" id="fifi-label">Fifi</div>
  <img class="bouncing-dog" id="snowy-photo" src="" style="display:none;">
  <div class="bouncing-dog placeholder" id="snowy-placeholder">🐩</div>
  <div class="dog-label" id="snowy-label">Snowy</div>

  <div class="splash-card" id="splash-card">
    <div class="emoji-row">🐶 🐕 🐩 🐕‍🦺</div>
    <h1 class="title">Cast Your<br>Vote Here!</h1>
    <p class="subtitle">Scan the QR code to guess the breeds</p>
    <div class="qr-wrap" id="qr-wrap"></div>
    <p class="url-text" id="url-text"></p>
    <p class="footer-note">🐾 Open your camera and point it at the QR code</p>
    <a href="/dashboard" class="nav-link">← Back to dashboard</a>
  </div>

  <script>
    const slug = window.location.pathname.split("/p/")[1]?.split("/")[0];
    const guessUrl = `${window.location.origin}/p/${slug}`;
    const qrSrc = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(guessUrl)}&margin=10`;
    document.getElementById("qr-wrap").innerHTML = `<img src="${qrSrc}" width="300" height="300" alt="QR code">`;
    document.getElementById("url-text").innerHTML = `<a href="${guessUrl}">${guessUrl.replace("https://","")}</a>`;

    function positionDogs(){
      const card=document.getElementById("splash-card");
      const rect=card.getBoundingClientRect(),vw=window.innerWidth;
      const fL=Math.max(10,rect.left-160),fT=rect.top+rect.height/2-65;
      document.getElementById("fifi-photo").style.left=document.getElementById("fifi-placeholder").style.left=fL+"px";
      document.getElementById("fifi-photo").style.top=document.getElementById("fifi-placeholder").style.top=fT+"px";
      document.getElementById("fifi-label").style.left=(fL+30)+"px";document.getElementById("fifi-label").style.top=(fT+145)+"px";
      const sL=Math.min(vw-170,rect.right+30),sT=rect.top+rect.height/2-65;
      document.getElementById("snowy-photo").style.left=document.getElementById("snowy-placeholder").style.left=sL+"px";
      document.getElementById("snowy-photo").style.top=document.getElementById("snowy-placeholder").style.top=sT+"px";
      document.getElementById("snowy-label").style.left=(sL+30)+"px";document.getElementById("snowy-label").style.top=(sT+145)+"px";
    }

    function applyAnimations(){
      const d="6s";
      document.getElementById("fifi-photo").style.animation=`fifiFloat ${d} ease-in-out infinite`;
      document.getElementById("fifi-placeholder").style.animation=`fifiFloat ${d} ease-in-out infinite`;
      document.getElementById("fifi-label").style.animation=`fifiFloat ${d} ease-in-out infinite`;
      document.getElementById("snowy-photo").style.animation=`snowyFloat ${d} ease-in-out infinite`;
      document.getElementById("snowy-placeholder").style.animation=`snowyFloat ${d} ease-in-out infinite`;
      document.getElementById("snowy-label").style.animation=`snowyFloat ${d} ease-in-out infinite`;
    }

    async function loadPhotos(){
      try{
        const token=localStorage.getItem("token");
        const headers=token?{"Authorization":"Bearer "+token}:{};
        const res=await fetch(`/api/parties/${slug}/answers`,{headers}).then(r=>r.json());
        if(res.answers){[1,2].forEach(d=>{const s=d===1?res.answers.image1:res.answers.image2;if(s){const p=document.getElementById(d===1?"fifi-photo":"snowy-photo");const pl=document.getElementById(d===1?"fifi-placeholder":"snowy-placeholder");p.src=s;p.style.display="block";pl.style.display="none"}})}
        // Get dog names
        try{const p=await fetch("/api/parties",{headers}).then(r=>r.json());const pp=p.find(x=>x.slug===slug);if(pp){document.getElementById("fifi-label").textContent=pp.dog1Name||"Dog 1";document.getElementById("snowy-label").textContent=pp.dog2Name||"Dog 2"}}catch{}
      }catch{}
    }

    positionDogs();applyAnimations();loadPhotos();
    window.addEventListener("resize",positionDogs);
  </script>
</body>
</html>
