<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin – Dog Breed Reveal</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#F5A623;--brown:#8B5E3C;--coral:#FF6B6B;--teal:#4ECDC4;--green:#7BC67E}
body{font-family:'Nunito',sans-serif;background:#faf5ed;min-height:100vh;color:#3D2B1F}
.container{max-width:640px;margin:0 auto;padding:20px}
.top-nav{display:flex;gap:8px;margin:15px 0;flex-wrap:wrap}
.top-nav a{padding:8px 16px;border-radius:12px;text-decoration:none;font-weight:700;font-size:.85rem;color:#8B5E3C;background:white;box-shadow:0 2px 10px rgba(0,0,0,.06);display:inline-flex;align-items:center;gap:6px}
.top-nav a:hover{background:#F5A623;color:white}
.top-nav a svg{width:16px;height:16px}
.card{background:white;border-radius:20px;padding:24px;box-shadow:0 4px 15px rgba(0,0,0,.06);margin-bottom:16px}
.card h3{font-family:'Fredoka One',cursive;color:#8B5E3C;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.card h3 svg{width:22px;height:22px}
.fg{margin-bottom:14px}.fg label{display:block;font-weight:700;color:#8B5E3C;margin-bottom:5px;font-size:.85rem}
.fg input,.fg select{width:100%;padding:12px 14px;border:2px solid #E8D5C4;border-radius:12px;font-size:1rem;background:#FFFBF5}
.fg input:focus,.fg select:focus{outline:none;border-color:#F5A623}
.dog-block{background:#FFFBF5;border:2px solid #F0E0CC;border-radius:14px;padding:16px;margin-bottom:12px}
.dog-block h4{font-family:'Fredoka One',cursive;color:#8B5E3C;font-size:1rem;margin-bottom:8px}
.br{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.br .sw{flex:2.5}.br .pw{flex:.7}
.br .pi{width:100%;padding:12px 8px;border:2px solid #E8D5C4;border-radius:12px;font-size:1rem;background:#FFFBF5;text-align:center}
.br .pi:focus{outline:none;border-color:#F5A623}
.pt{font-size:.85rem;font-weight:700;margin-top:4px;display:flex;align-items:center;gap:6px}
.pt.bad{color:#FF6B6B}.pt.good{color:#7BC67E}
.pb{flex:1;height:8px;background:#f0e0cc;border-radius:4px;overflow:hidden}
.pf{height:100%;border-radius:4px;transition:width .3s}.pf.good{background:#7BC67E}.pf.bad{background:#FF6B6B}
.abtn{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;background:transparent;border:2px solid #F5A623;border-radius:14px;font-weight:700;font-size:.9rem;color:#F5A623;cursor:pointer;transition:transform .2s,box-shadow .2s}
.abtn:hover{transform:translateY(-1px);box-shadow:0 4px 15px rgba(245,166,35,.2)}.abtn:disabled{opacity:.3;cursor:not-allowed}
.abtn svg{width:16px;height:16px}
.rmb{width:28px;height:28px;border:none;background:#FFF0F0;color:#FF6B6B;border-radius:50%;font-size:.9rem;cursor:pointer;font-weight:700;display:flex;align-items:center;justify-content:center}
.rmb:hover{background:#FF6B6B;color:white}
.phs{margin:10px 0 4px}.phl{font-size:.8rem;font-weight:700;color:#8B5E3C;display:block;margin-bottom:6px}
.phi{display:flex;align-items:center;gap:8px}
.phi .btn-file{position:relative;overflow:hidden;cursor:pointer;background:#4ECDC4;color:white;padding:8px 16px;border-radius:12px;font-weight:700;font-size:.85rem;border:none;display:inline-flex;align-items:center;gap:6px;transition:transform .2s,box-shadow .2s;box-shadow:0 4px 15px rgba(78,205,196,.3)}
.phi .btn-file:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(78,205,196,.5)}
.phi .btn-file svg{width:16px;height:16px}
.phi .btn-file input[type=file]{position:absolute;top:0;left:0;width:100%;height:100%;opacity:0;cursor:pointer}
.phi .purl{flex:1;padding:8px 12px;border:2px solid #E8D5C4;border-radius:10px;font-size:.85rem;background:#FFFBF5}
.phor{font-size:.8rem;color:#aaa;font-weight:700}
.pv{max-width:200px;height:200px;object-fit:cover;border-radius:14px;margin-top:8px;border:2px solid #f0e0cc;display:none}
.pv.show{display:block}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:14px 24px;border:none;border-radius:14px;font-weight:700;font-size:.95rem;cursor:pointer;transition:transform .2s}
.btn svg{width:20px;height:20px;flex-shrink:0}
.btn:hover{transform:translateY(-1px)}
.btn-p{width:100%;background:linear-gradient(135deg,#F5A623,#E8961A);color:white;box-shadow:0 4px 15px rgba(245,166,35,.3)}
.btn-d{background:#FF6B6B;color:white}
.btn-s{padding:6px 12px;font-size:.8rem;border-radius:10px}.btn-s svg{width:16px;height:16px}
.btn-icon{width:44px;height:44px;padding:0;border-radius:14px;background:#4ECDC4;color:white;box-shadow:0 4px 15px rgba(78,205,196,.3)}
.btn-icon:hover{box-shadow:0 6px 20px rgba(78,205,196,.5)}
.btn-icon svg{width:20px;height:20px}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.spin svg{animation:spin .8s linear infinite}
.sm{font-size:.85rem;margin-bottom:10px}.sm .good{color:#7BC67E;font-weight:700}
.ar{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #f0e0cc}
.ar:last-child{border-bottom:none}.ai{flex:1;min-width:0}
.an{font-weight:800;font-size:.9rem}.ab{font-size:.78rem;color:#888}
.gheader{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
</style></head><body>
<div class="container">
<div class="top-nav">
  <a href="/dashboard"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5m7-7l-7 7 7 7"/></svg>Dashboard</a>
  <a href="#" id="navs"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>Slideshow</a>
  <a href="#" id="navq"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>QR</a>
  <a href="#" id="navg"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>Guess</a>
</div>

<div class="card">
  <h3><svg viewBox="0 0 24 24" fill="none" stroke="#F5A623" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>Set Correct Breeds</h3>
  <div class="sm" id="amsg"></div>
  <div id="adogs"></div>
  <button class="btn btn-p" id="sbtn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
    Save Answers
  </button>
</div>

<div class="card">
  <div class="gheader">
    <h3 style="margin-bottom:0"><svg viewBox="0 0 24 24" fill="none" stroke="#FF6B6B" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>Manage Guesses</h3>
    <button class="btn btn-icon" id="rbtn" title="Refresh">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
    </button>
  </div>
  <div id="glist"></div>
</div>
</div></body>
<script>
var slug = window.location.pathname.split("/p/")[1].split("/")[0];
var API = "/api/parties/" + slug;
var token = localStorage.getItem("token");
var hdrs = { "Content-Type": "application/json", "Authorization": "Bearer " + token };
document.getElementById("navs").href = "/p/" + slug + "/slideshow";
document.getElementById("navq").href = "/p/" + slug + "/qr";
document.getElementById("navg").href = "/p/" + slug;

var BREEDS = ["","Affenpinscher","Afghan Hound","Airedale Terrier","Akita","Alaskan Malamute","American Bulldog","American Cocker Spaniel","Australian Cattle Dog","Australian Shepherd","Basenji","Basset Hound","Beagle","Bearded Collie","Belgian Malinois","Bernese Mountain Dog","Bichon Frise","Bloodhound","Border Collie","Boston Terrier","Boxer","Brittany","Bulldog","Bullmastiff","Cairn Terrier","Cane Corso","Cavalier King Charles Spaniel","Chihuahua","Chinese Crested","Chow Chow","Cocker Spaniel","Collie","Corgi (Pembroke Welsh)","Corgi (Cardigan Welsh)","Dachshund","Dalmatian","Doberman Pinscher","English Bulldog","English Springer Spaniel","French Bulldog","German Shepherd","German Shorthaired Pointer","Golden Retriever","Gordon Setter","Great Dane","Great Pyrenees","Greyhound","Havanese","Irish Setter","Irish Wolfhound","Italian Greyhound","Jack Russell Terrier","Japanese Chin","Keeshond","Labrador Retriever","Leonberger","Lhasa Apso","Maltese","Mastiff","Miniature Pinscher","Miniature Schnauzer","Newfoundland","Norfolk Terrier","Norwegian Elkhound","Old English Sheepdog","Papillon","Pekingese","Pit Bull Terrier","Pointer","Pomeranian","Poodle","Portuguese Water Dog","Pug","Rhodesian Ridgeback","Rottweiler","Saint Bernard","Saluki","Samoyed","Schipperke","Scottish Terrier","Shar-Pei","Shetland Sheepdog","Shiba Inu","Shih Tzu","Siberian Husky","Silky Terrier","Staffordshire Bull Terrier","Vizsla","Weimaraner","Welsh Springer Spaniel","Welsh Terrier","West Highland White Terrier","Whippet","Wire Fox Terrier","Yorkshire Terrier","Mixed Breed / Mutt","Other"];
var F = [];
for (var i = 0; i < BREEDS.length; i++) { if (BREEDS[i]) F.push(BREEDS[i]); }
var MAX = 4;

function esc(s) { var d = document.createElement("div"); d.textContent = s; return d.innerHTML; }

function bselect(sel) {
  var s = document.createElement("select");
  var h = "";
  for (var i = 0; i < F.length; i++) h += "<option value=\"" + F[i] + "\"" + (F[i] === sel ? " selected" : "") + ">" + F[i] + "</option>";
  s.innerHTML = h;
  return s;
}

function brow(i, breed, pct) {
  var d = document.createElement("div"); d.className = "br";
  var sw = document.createElement("div"); sw.className = "fg sw"; sw.style.marginBottom = "0"; sw.appendChild(bselect(breed || ""));
  var pw = document.createElement("div"); pw.className = "fg pw"; pw.style.marginBottom = "0";
  var inp = document.createElement("input"); inp.type = "number"; inp.className = "pi"; inp.value = pct || 0; inp.min = 0; inp.max = 100; inp.placeholder = "%";
  pw.appendChild(inp);
  d.appendChild(sw); d.appendChild(pw);
  if (i > 0) { var rm = document.createElement("button"); rm.className = "rmb"; rm.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>'; rm.onclick = function() { d.remove(); utot(); }; d.appendChild(rm); }
  else { var sp = document.createElement("span"); sp.style.width = "28px"; sp.style.flexShrink = "0"; d.appendChild(sp); }
  inp.oninput = utot;
  var selEl = sw.querySelector("select");
  selEl.onchange = function() {
    var block = d.closest(".dog-block");
    if (block.querySelectorAll(".br").length === 1) adist(block);
    utot();
  };
  return d;
}

function drows(block) { return block.querySelectorAll(".br").length; }

function collect(block) {
  var rows = block.querySelectorAll(".br"); var result = [];
  for (var i = 0; i < rows.length; i++) {
    var sel = rows[i].querySelector("select").value;
    var pct = parseInt(rows[i].querySelector(".pi").value) || 0;
    if (sel) result.push({ breed: sel, percentage: pct });
  }
  return result;
}

function adist(block) {
  var rows = block.querySelectorAll(".br"); var sel = [];
  for (var i = 0; i < rows.length; i++) { if (rows[i].querySelector("select").value) sel.push(i); }
  if (!sel.length) return;
  var each = Math.floor(100 / sel.length), rem = 100 - each * sel.length;
  for (var i = 0; i < sel.length; i++) { rows[sel[i]].querySelector(".pi").value = each + (i === 0 ? rem : 0); }
  utot();
}

function utot() {
  var blocks = document.querySelectorAll(".dog-block");
  for (var i = 0; i < blocks.length; i++) {
    var data = collect(blocks[i]), total = 0;
    for (var j = 0; j < data.length; j++) total += data[j].percentage;
    var bar = blocks[i].querySelector(".pf");
    var tv = blocks[i].querySelector(".tv");
    if (tv) tv.textContent = total + "%";
    if (bar) { bar.style.width = Math.min(total, 100) + "%"; var g = Math.abs(total - 100) < 1; bar.className = "pf " + (g ? "good" : "bad"); }
  }
}

function makedog(dog, i, existing) {
  var block = document.createElement("div"); block.className = "dog-block"; block.dataset.index = i;
  var name = (existing && existing.name) || dog.name || ("Dog " + (i + 1));
  block.innerHTML = "<h4>🐶 " + esc(name) + "</h4>";

  var breeds = (existing && existing.breeds) || [];
  for (var j = 0; j < breeds.length; j++) block.appendChild(brow(j, breeds[j].breed, breeds[j].percentage));
  if (drows(block) === 0) block.appendChild(brow(0));

  block.innerHTML += "<div class=\"pt\"><span>Total:</span><span class=\"tv\">0%</span><div class=\"pb\"><div class=\"pf\" style=\"width:0%\"></div></div></div>";

  var ps = document.createElement("div"); ps.className = "phs";
  ps.innerHTML = "<label class=\"phl\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" style=\"width:14px;height:14px;vertical-align:middle\"><rect x=\"3\" y=\"3\" width=\"18\" height=\"18\" rx=\"2\" ry=\"2\"/><circle cx=\"8.5\" cy=\"8.5\" r=\"1.5\"/><polyline points=\"21 15 16 10 5 21\"/></svg> Photo (optional)</label><div class=\"phi\"><span class=\"btn-file\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4\"/><polyline points=\"17 8 12 3 7 8\"/><line x1=\"12\" y1=\"3\" x2=\"12\" y2=\"15\"/></svg> Upload<input type=\"file\" class=\"pfile\" accept=\"image/*\"></span><span class=\"phor\">or</span><input type=\"text\" class=\"purl\" placeholder=\"Paste image URL...\"></div><img class=\"pv\" src=\"\" alt=\"Preview\">";
  block.appendChild(ps);

  if (existing && existing.image) {
    var pv = ps.querySelector(".pv"); pv.src = existing.image; pv.classList.add("show");
    block.dataset.photo = existing.image;
  }

  var fi = ps.querySelector(".pfile");
  fi.onchange = function() {
    var f = fi.files[0]; if (!f) return;
    if (f.size > 3*1024*1024) { alert("Max 3MB"); return; }
    var r = new FileReader();
    r.onload = function() { block.dataset.photo = r.result; var p = ps.querySelector(".pv"); p.src = r.result; p.classList.add("show"); };
    r.readAsDataURL(f);
  };
  var ui = ps.querySelector(".purl");
  ui.oninput = function() {
    var u = ui.value.trim();
    if (u) { block.dataset.photo = u; var p = ps.querySelector(".pv"); p.src = u; p.classList.add("show"); }
  };

  var ab = document.createElement("button"); ab.className = "abtn";
  ab.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Add breed';
  ab.onclick = function() {
    if (drows(block) >= MAX) return;
    block.insertBefore(brow(drows(block)), ab);
    ab.disabled = drows(block) >= MAX;
    adist(block);
  };
  block.appendChild(ab);
  return block;
}

function loaddogs(dogs, answers) {
  var c = document.getElementById("adogs"); c.innerHTML = "";
  for (var i = 0; i < dogs.length; i++) {
    var ex = (answers && answers.dogs && answers.dogs[i]) || null;
    c.appendChild(makedog(dogs[i], i, ex));
  }
  utot();
}

document.getElementById("sbtn").onclick = function() {
  var blocks = document.querySelectorAll(".dog-block"); var dogs = [];
  for (var i = 0; i < blocks.length; i++) {
    var breeds = collect(blocks[i]);
    if (!breeds.length) { alert("Each dog needs at least one breed"); return; }
    dogs.push({ breeds: breeds, image: blocks[i].dataset.photo || null });
  }
  fetch(API + "/answers", { method: "POST", headers: hdrs, body: JSON.stringify({ dogs: dogs }) })
    .then(function(r) { return r.json().then(function(d) { if (!r.ok) throw new Error(d.error); return d; }); })
    .then(function() {
      document.getElementById("amsg").innerHTML = "<span class=\"good\">✓ Saved!</span>";
      setTimeout(function() { document.getElementById("amsg").innerHTML = ""; }, 3000);
    })
    .catch(function(e) { alert(e.message || "Failed to save"); });
};

function loadpanel() {
  var p1 = fetch(API + "/answers", { headers: hdrs }).then(function(r) { return r.json(); }).catch(function() { return {}; });
  var p2 = fetch(API + "/guesses").then(function(r) { return r.json(); }).catch(function() { return {}; });
  Promise.all([p1, p2]).then(function(r) {
    var answers = r[0], gd = r[1];
    var dogs = gd.dogs || [];
    if (!dogs.length) dogs = [{ name: "Dog 1" }];
    loaddogs(dogs, answers.answers);
    loadguesses();
  });
}

function loadguesses() {
  var list = document.getElementById("glist");
  var btn = document.getElementById("rbtn");
  btn.classList.add("spin");
  fetch(API + "/guesses").then(function(r) { return r.json(); }).then(function(d) {
    btn.classList.remove("spin");
    var g = d.guesses || [];
    if (!g.length) { list.innerHTML = "<p style=\"color:#888;text-align:center;padding:10px\">No guesses yet.</p>"; return; }
    var h = "";
    for (var i = 0; i < g.length; i++) {
      var gg = g[i];
      var gbreeds = [];
      for (var j = 0; j < (gg.guesses || []).length; j++) gbreeds.push("Dog " + (j+1) + ": " + gg.guesses[j].join(", "));
      h += "<div class=\"ar\"><div class=\"ai\"><div class=\"an\">" + esc(gg.name) + "</div><div class=\"ab\">" + esc(gbreeds.join(" | ")) + "</div></div><button class=\"btn btn-d btn-s db\" data-id=\"" + gg.id + "\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" width=\"14\" height=\"14\"><polyline points=\"3 6 5 6 21 6\"/><path d=\"M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2\"/></svg></button></div>";
    }
    list.innerHTML = h;
    var btns = list.querySelectorAll(".db");
    for (var i = 0; i < btns.length; i++) {
      btns[i].onclick = function() {
        if (!confirm("Delete?")) return;
        fetch(API + "/guesses/" + this.dataset.id, { method: "DELETE", headers: hdrs }).then(function() { loadguesses(); });
      };
    }
  }).catch(function() { btn.classList.remove("spin"); list.innerHTML = "<p style=\"color:#888\">Could not load.</p>"; });
}

document.getElementById("rbtn").onclick = loadguesses;
loadpanel();
</script>
</body></html>
