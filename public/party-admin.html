<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin – Dog Breed Reveal</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
<style>
.admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--s); }
</style></head><body>
<div class="container">
<div class="nav-bar">
  <a href="/dashboard" class="nav-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5m7-7l-7 7 7 7"/></svg>Dashboard</a>
  <a href="#" id="navs" class="nav-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>Slideshow</a>
  <a href="#" id="navq" class="nav-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>QR</a>
  <a href="#" id="navg" class="nav-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>Guess</a>
</div>

<div class="card">
  <h3 style="display:flex;align-items:center;gap:var(--s)"><svg viewBox="0 0 24 24" fill="none" stroke="#F5A623" stroke-width="2" style="width:22px;height:22px"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>Set Correct Breeds</h3>
  <div id="amsg" class="mb-8"></div>
  <div id="adogs"></div>
  <button class="btn btn-primary btn-block" id="sbtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>Save Answers</button>
</div>

<div class="card">
  <div class="admin-header">
    <h3 style="margin-bottom:0;display:flex;align-items:center;gap:var(--s)"><svg viewBox="0 0 24 24" fill="none" stroke="#FF6B6B" stroke-width="2" style="width:22px;height:22px"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>Manage Guesses</h3>
    <button class="btn btn-icon" id="rbtn" title="Refresh"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg></button>
  </div>
  <div id="glist"></div>
</div>
</div>

<script src="/app.js"></script>
<script>
var API = App.api();
var hdrs = App.headers();
document.getElementById("navs").href = "/p/" + App.slug() + "/slideshow";
document.getElementById("navq").href = "/p/" + App.slug() + "/qr";
document.getElementById("navg").href = "/p/" + App.slug();
var MAX = 4;

function loaddogs(dogs, answers) {
  var c = document.getElementById("adogs"); c.innerHTML = "";
  for (var i = 0; i < dogs.length; i++) {
    var ex = (answers && answers.dogs && answers.dogs[i]) || null;
    var block = App.createDogBlock(dogs[i], i, ex);
    c.appendChild(block);
  }
  App.updatePercentages();
}

document.getElementById("sbtn").onclick = function() {
  var blocks = document.querySelectorAll(".dog-section");
  var dogs = [];
  for (var i = 0; i < blocks.length; i++) {
    var breeds = App.collectBreeds(blocks[i]);
    if (!breeds.length) { alert("Each dog needs at least one breed"); return; }
    dogs.push({ breeds: breeds, image: blocks[i].dataset.photo || null });
  }
  fetch(API + "/answers", { method: "POST", headers: hdrs, body: JSON.stringify({ dogs: dogs }) })
    .then(function(r) { return r.json().then(function(d) { if (!r.ok) throw new Error(d.error); return d; }); })
    .then(function() {
      document.getElementById("amsg").innerHTML = '<span class="text-success">✓ Saved!</span>';
      setTimeout(function() { document.getElementById("amsg").innerHTML = ""; }, 3000);
    })
    .catch(function(e) { alert(e.message); });
};

function loadpanel() {
  var p1 = fetch(API + "/answers", { headers: hdrs }).then(function(r) { return r.json(); }).catch(function() { return {}; });
  var p2 = fetch(API + "/guesses").then(function(r) { return r.json(); }).catch(function() { return {}; });
  Promise.all([p1, p2]).then(function(r) {
    var gd = r[1];
    var dogs = gd.dogs || [];
    if (!dogs.length) dogs = [{ name: "Dog 1" }];
    loaddogs(dogs, r[0].answers);
    loadguesses();
  });
}

function loadguesses() {
  var list = document.getElementById("glist");
  var btn = document.getElementById("rbtn");
  btn.classList.add("spin");
  fetch(API + "/guesses").then(function(r) { return r.json(); }).then(function(d) {
    btn.classList.remove("spin");
    var g = d.guesses || [];
    if (!g.length) { list.innerHTML = '<p class="text-muted text-center" style="padding:10px">No guesses yet.</p>'; return; }
    var h = "";
    for (var i = 0; i < g.length; i++) {
      var gg = g[i], gb = [];
      for (var j = 0; j < (gg.guesses || []).length; j++) gb.push("Dog " + (j+1) + ": " + gg.guesses[j].join(", "));
      h += '<div class="data-row"><div class="info"><div class="name">' + App.esc(gg.name) + '</div><div class="detail">' + App.esc(gb.join(" | ")) + '</div></div><button class="btn btn-danger btn-sm db" data-id="' + gg.id + '"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg></button></div>';
    }
    list.innerHTML = h;
    list.querySelectorAll(".db").forEach(function(b) {
      b.onclick = function() {
        if (!confirm("Delete?")) return;
        fetch(API + "/guesses/" + this.dataset.id, { method: "DELETE", headers: hdrs }).then(function() { loadguesses(); });
      };
    });
  }).catch(function() { btn.classList.remove("spin"); list.innerHTML = '<p class="text-muted text-center">Could not load.</p>'; });
}

document.getElementById("rbtn").onclick = loadguesses;
loadpanel();
</script>
</body></html>
