<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guess the Breeds!</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
<style>
body{background:var(--cream);background-image:radial-gradient(circle at 10% 20%,rgba(245,166,35,.08) 0%,transparent 50%),radial-gradient(circle at 90% 80%,rgba(255,107,107,.08) 0%,transparent 50%);min-height:100vh}
header{text-align:center;padding:30px 20px 10px}
header .emoji{font-size:40px;animation:bounce 1.5s ease-in-out infinite alternate}
@keyframes bounce{0%{transform:translateY(0)}100%{transform:translateY(-8px)}}
header h1{font-size:2.4rem;text-shadow:2px 2px 0 rgba(245,166,35,.3)}
.subtitle{font-size:1.1rem;opacity:.8;margin-top:var(--s-sm);font-weight:600;color:var(--brown)}
.guess-card{border:3px dashed rgba(245,166,35,.15)}
.success{text-align:center;padding:40px 20px;animation:popIn .5s cubic-bezier(.68,-.55,.265,1.55)}
@keyframes popIn{0%{transform:scale(.5);opacity:0}100%{transform:scale(1);opacity:1}}
.success .big{font-size:70px;display:block;margin-bottom:10px}
@media(max-width:500px){.container{padding:12px}header h1{font-size:2rem}}
</style></head><body>
<div class="container">
<header><div class="emoji">🐶 🐕 🦴 🐩 🐕‍🦺</div><h1>Dog Breed Reveal Party!</h1><p class="subtitle">Can you guess the breeds?</p></header>

<div class="card guess-card" id="guess-form-card">
  <div class="form-group"><label>Your Name</label><input type="text" id="guestName" placeholder="e.g. Ash" maxlength="40" autocomplete="off"></div>
  <div id="dogSections"></div>
  <button class="btn btn-primary btn-block" id="submit-btn">🐾 Submit My Guess!</button>
</div>

<div class="card success hidden" id="success-card"><span class="big">🎉</span><h2>Woof-tastic!</h2><p style="font-size:1.1rem;margin:var(--s) 0;">Your guess has been recorded!</p><button class="btn btn-primary" id="guess-again-btn">Make Another Guess</button></div>
</div>

<script src="/app.js"></script>
<script>
var API = App.api();
var MAX = 4;

function breedSelect(ph){var s=document.createElement("select");s.className="form-group";s.style.marginBottom="0";var h='<option value="">'+ph+'</option>';for(var i=0;i<App.BREEDS.length;i++)h+='<option value="'+App.BREEDS[i]+'">'+App.BREEDS[i]+'</option>';s.innerHTML=h;return s}

function breedRow(idx){var d=document.createElement("div");d.className="breed-row";var w=document.createElement("div");w.className="form-group select-col";w.style.marginBottom="0";w.appendChild(breedSelect(idx===0?"-- Pick a breed --":"-- Optional --"));d.appendChild(w);if(idx>0){var r=document.createElement("button");r.className="rm-btn";r.textContent="×";r.onclick=function(){d.remove();updateBtns()}}else{var s=document.createElement("span");s.style.cssText="width:28px;flex-shrink:0";d.appendChild(s)}return d}

function makeDog(dog,i){var s=document.createElement("div");s.className="dog-section";s.id="dog-"+i;s.innerHTML='<h4>🐶 '+App.esc(dog.name||"Dog "+(i+1))+'</h4>';s.appendChild(breedRow(0));var b=document.createElement("button");b.className="btn btn-outline btn-sm mt-8";b.textContent="+ Add another breed";b.onclick=function(){if(s.querySelectorAll(".breed-row").length>=MAX)return;s.insertBefore(breedRow(s.querySelectorAll(".breed-row").length),b)};s.appendChild(b);return s}

function updateBtns(){document.querySelectorAll(".dog-section").forEach(function(s){var b=s.querySelector(".btn-outline");if(b)b.disabled=s.querySelectorAll(".breed-row").length>=MAX})}
function collectAll(){var gs=[];document.querySelectorAll(".dog-section").forEach(function(s){var breeds=Array.from(s.querySelectorAll("select")).map(function(sl){return sl.value}).filter(function(v){return v});gs.push(breeds)});return gs}

async function loadDogs(){try{var r=await fetch(API+"/guesses");var d=await r.json();var dogs=d.dogs||[{name:"Dog 1"}];var c=document.getElementById("dogSections");c.innerHTML="";dogs.forEach(function(dog,i){c.appendChild(makeDog(dog,i))})}catch(e){var c=document.getElementById("dogSections");c.innerHTML="";c.appendChild(makeDog({name:"Dog 1"},0))}}

document.getElementById("submit-btn").onclick=async function(){
  var name=document.getElementById("guestName").value.trim(),guesses=collectAll();
  if(!name){document.getElementById("guestName").focus();return}
  if(guesses.some(function(g){return g.length===0})){document.querySelector(".dog-section select").focus();return}
  try{
    var res=await fetch(API+"/guesses",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({name:name,guesses:guesses})});
    if(!res.ok){var e=await res.json();alert(e.error);return}
    App.confetti();document.getElementById("guess-form-card").classList.add("hidden");document.getElementById("success-card").classList.remove("hidden")
  }catch(ex){alert("Connection failed")}
};
document.getElementById("guess-again-btn").onclick=function(){document.getElementById("guestName").value="";loadDogs();document.getElementById("guess-form-card").classList.remove("hidden");document.getElementById("success-card").classList.add("hidden")};
loadDogs();
</script>
</body></html>
