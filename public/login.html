<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dog Breed Reveal</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
<style>
body{background:linear-gradient(160deg,var(--cream),#FFECD2,#FFF3E0);min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-card{background:white;border-radius:32px;padding:40px 36px;box-shadow:0 8px 50px rgba(0,0,0,.1);border:3px dashed rgba(245,166,35,.15);max-width:420px;width:100%;text-align:center}
.logo{font-family:var(--font-display);font-size:2rem;color:var(--brown);margin-bottom:var(--s)}
.subtitle{color:var(--brown);opacity:.7;margin-bottom:var(--s-xl);font-weight:600}
.divider{display:flex;align-items:center;gap:var(--s-md);margin:var(--s-lg) 0;color:#aaa;font-size:.85rem;font-weight:600}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#e0d5c4}
.toggle{color:var(--teal);font-weight:700;cursor:pointer;margin-top:var(--s-md)}
.toggle:hover{text-decoration:underline}
.google-btn{display:flex;align-items:center;justify-content:center;gap:var(--s);background:white;border:2px solid #ddd;padding:12px;border-radius:var(--radius);font-weight:700;font-size:.95rem;color:#444;cursor:pointer;text-decoration:none;transition:background .2s;width:100%}
.google-btn:hover{background:#f8f8f8}
.google-btn svg{width:20px;height:20px}
</style></head><body>
<div class="login-card">
<div class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="#8B5E3C" stroke-width="2" style="width:32px;height:32px;vertical-align:middle"><path d="M12 2a4 4 0 013.464 6.001L21 12l-5.536 3.999A4 4 0 1112 2z"/></svg> Dog Breed<br>Reveal Party</div>
<p class="subtitle">Create a reveal party for your dogs!</p>

<div id="login-form">
  <div class="form-group"><label>Email</label><input type="email" id="loginEmail" placeholder="you@email.com" autocomplete="email"></div>
  <div class="form-group"><label>Password</label><input type="password" id="loginPassword" placeholder="Password" autocomplete="current-password"></div>
  <p class="text-error" id="loginError" style="display:none;"></p>
  <button class="btn btn-primary btn-block" id="loginBtn">Log In</button>
  <div class="divider">or</div>
  <a href="/api/auth/google" class="google-btn"><svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>Continue with Google</a>
  <p class="toggle" onclick="showRegister()">Don't have an account? <b>Register</b></p>
</div>

<div id="register-form" class="hidden">
  <div class="form-group"><label>Your Name</label><input type="text" id="regName" placeholder="Ash" autocomplete="name"></div>
  <div class="form-group"><label>Email</label><input type="email" id="regEmail" placeholder="you@email.com" autocomplete="email"></div>
  <div class="form-group"><label>Password</label><input type="password" id="regPassword" placeholder="Min 6 characters" autocomplete="new-password"></div>
  <p class="text-error" id="regError" style="display:none;"></p>
  <button class="btn btn-primary btn-block" id="registerBtn">Create Account</button>
  <div class="divider">or</div>
  <a href="/api/auth/google" class="google-btn"><svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>Continue with Google</a>
  <p class="toggle" onclick="showLogin()">Already have an account? <b>Log in</b></p>
</div>
</div>

<script>
var token = localStorage.getItem("token");
if (token) { fetch("/api/auth/me",{headers:{"Authorization":"Bearer "+token}}).then(function(r){if(r.ok)window.location.href="/dashboard"}); }

var urlParams = new URLSearchParams(window.location.search);
var t = urlParams.get("token");
if (t) { localStorage.setItem("token", t); window.location.href = "/dashboard"; }

function showRegister(){document.getElementById("login-form").classList.add("hidden");document.getElementById("register-form").classList.remove("hidden")}
function showLogin(){document.getElementById("register-form").classList.add("hidden");document.getElementById("login-form").classList.remove("hidden")}

document.getElementById("loginBtn").onclick=function(){
  var e=document.getElementById("loginEmail").value.trim(),p=document.getElementById("loginPassword").value,er=document.getElementById("loginError");
  fetch("/api/auth/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email:e,password:p})}).then(function(r){return r.json().then(function(d){if(!r.ok)throw new Error(d.error);localStorage.setItem("token",d.token);window.location.href="/dashboard"})}).catch(function(ex){er.textContent=ex.message;er.style.display="block"});
};
document.getElementById("registerBtn").onclick=function(){
  var n=document.getElementById("regName").value.trim(),e=document.getElementById("regEmail").value.trim(),p=document.getElementById("regPassword").value,er=document.getElementById("regError");
  if(!n||!e||!p){er.textContent="All fields required";er.style.display="block";return}
  fetch("/api/auth/register",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email:e,password:p,name:n})}).then(function(r){return r.json().then(function(d){if(!r.ok)throw new Error(d.error);localStorage.setItem("token",d.token);window.location.href="/dashboard"})}).catch(function(ex){er.textContent=ex.message;er.style.display="block"});
};
document.querySelectorAll("input").forEach(function(i){i.onkeydown=function(e){if(e.key==="Enter"){var b=document.getElementById("register-form").classList.contains("hidden")?document.getElementById("loginBtn"):document.getElementById("registerBtn");b.click()}}});
</script>
</body></html>
