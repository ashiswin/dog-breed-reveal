<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dog Breed Reveal Party</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--gold:#F5A623;--brown:#8B5E3C;--cream:#FFF8E7;--coral:#FF6B6B;--teal:#4ECDC4;--dark:#3D2B1F}
    body{font-family:'Nunito',sans-serif;background:linear-gradient(160deg,#FFF8E7,#FFECD2,#FFF3E0);min-height:100vh;color:var(--dark);display:flex;align-items:center;justify-content:center}
    .paw-bg{position:fixed;pointer-events:none;z-index:0;opacity:.06;font-size:60px;user-select:none}
    .paw-bg:nth-child(1){top:5%;left:5%;transform:rotate(-15deg)}
    .paw-bg:nth-child(2){top:15%;right:8%;transform:rotate(25deg);font-size:45px}
    .paw-bg:nth-child(3){top:40%;left:3%;transform:rotate(10deg);font-size:50px}
    .paw-bg:nth-child(4){top:60%;right:5%;transform:rotate(-20deg);font-size:42px}
    .paw-bg:nth-child(5){bottom:10%;left:8%;transform:rotate(30deg);font-size:38px}
    .paw-bg:nth-child(6){bottom:20%;right:12%;transform:rotate(-10deg);font-size:55px}
    .card{position:relative;z-index:1;background:white;border-radius:28px;padding:40px 36px;box-shadow:0 8px 50px rgba(0,0,0,.1);border:3px dashed rgba(245,166,35,.15);max-width:420px;width:100%;text-align:center}
    .logo{font-family:'Fredoka One',cursive;font-size:2rem;color:var(--brown);margin-bottom:8px}
    .subtitle{color:var(--brown);opacity:.7;margin-bottom:24px;font-weight:600}
    .form-group{margin-bottom:14px;text-align:left}
    .form-group label{display:block;font-weight:700;color:var(--brown);margin-bottom:4px;font-size:.85rem}
    .form-group input{width:100%;padding:12px 16px;border:2px solid #E8D5C4;border-radius:12px;font-family:'Nunito',sans-serif;font-size:1rem;background:#FFFBF5;transition:border-color .2s}
    .form-group input:focus{outline:none;border-color:var(--gold)}
    .btn{width:100%;padding:14px;border:none;border-radius:14px;font-family:'Nunito',sans-serif;font-weight:700;font-size:1rem;cursor:pointer;transition:transform .2s}
    .btn:hover{transform:translateY(-1px)}
    .btn-primary{background:linear-gradient(135deg,var(--gold),#E8961A);color:white;box-shadow:0 4px 15px rgba(245,166,35,.3)}
    .btn-google{background:white;color:#444;border:2px solid #ddd;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:8px}
    .btn-google:hover{background:#f8f8f8}
    .divider{display:flex;align-items:center;gap:12px;margin:16px 0;color:#aaa;font-size:.85rem;font-weight:600}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:#e0d5c4}
    .toggle-link{color:var(--teal);font-weight:700;cursor:pointer;margin-top:12px}
    .toggle-link:hover{text-decoration:underline}
    .error{color:var(--coral);font-size:.85rem;margin-top:4px;display:none}
    @media(max-width:500px){.card{padding:28px 20px}}
  </style>
</head>
<body>
  <div class="paw-bg">🐾</div><div class="paw-bg">🐾</div><div class="paw-bg">🐾</div>
  <div class="paw-bg">🐾</div><div class="paw-bg">🐾</div><div class="paw-bg">🐾</div>

  <div class="card">
    <div class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="#8B5E3C" stroke-width="2" style="width:32px;height:32px;vertical-align:middle"><path d="M12 2a4 4 0 013.464 6.001L21 12l-5.536 3.999A4 4 0 1112 2z"/></svg> Dog Breed<br>Reveal Party</div>
    <p class="subtitle">Create a reveal party for your dogs!</p>

    <!-- Login form -->
    <div id="login-form">
      <div class="form-group"><label>Email</label><input type="email" id="loginEmail" placeholder="you@email.com" autocomplete="email"></div>
      <div class="form-group"><label>Password</label><input type="password" id="loginPassword" placeholder="Password" autocomplete="current-password"></div>
      <p class="error" id="loginError"></p>
      <button class="btn btn-primary" id="loginBtn">Log In</button>
      <div class="divider">or</div>
      <a href="/api/auth/google" class="btn btn-google"><svg viewBox="0 0 24 24" width="20" height="20"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>Continue with Google</a>
      <p class="toggle-link" id="showRegister">Don't have an account? <b>Register</b></p>
    </div>

    <!-- Register form -->
    <div id="register-form" style="display:none;">
      <div class="form-group"><label>Your Name</label><input type="text" id="regName" placeholder="Ash" autocomplete="name"></div>
      <div class="form-group"><label>Email</label><input type="email" id="regEmail" placeholder="you@email.com" autocomplete="email"></div>
      <div class="form-group"><label>Password</label><input type="password" id="regPassword" placeholder="Min 6 characters" autocomplete="new-password"></div>
      <p class="error" id="regError"></p>
      <button class="btn btn-primary" id="registerBtn">Create Account</button>
      <div class="divider">or</div>
      <a href="/api/auth/google" class="btn btn-google"><svg viewBox="0 0 24 24" width="20" height="20"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>Continue with Google</a>
      <p class="toggle-link" id="showLogin">Already have an account? <b>Log in</b></p>
    </div>
  </div>

  <script>
    var token = localStorage.getItem("token");
    if (token) {
      fetch("/api/auth/me", { headers: { "Authorization": "Bearer " + token } })
        .then(function(r) { if (r.ok) window.location.href = "/dashboard"; });
    }

    document.getElementById("showRegister").addEventListener("click", () => {
      document.getElementById("login-form").style.display = "none";
      document.getElementById("register-form").style.display = "block";
    });
    document.getElementById("showLogin").addEventListener("click", () => {
      document.getElementById("register-form").style.display = "none";
      document.getElementById("login-form").style.display = "block";
    });

    document.getElementById("loginBtn").addEventListener("click", async () => {
      const email = document.getElementById("loginEmail").value.trim();
      const password = document.getElementById("loginPassword").value;
      const err = document.getElementById("loginError");
      try {
        const res = await fetch("/api/auth/login", {
          method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email,password})
        });
        const data = await res.json();
        if (!res.ok) { err.textContent = data.error; err.style.display = "block"; return; }
        localStorage.setItem("token", data.token);
        window.location.href = "/dashboard";
      } catch { err.textContent = "Connection failed"; err.style.display = "block"; }
    });

    document.getElementById("registerBtn").addEventListener("click", async () => {
      const name = document.getElementById("regName").value.trim();
      const email = document.getElementById("regEmail").value.trim();
      const password = document.getElementById("regPassword").value;
      const err = document.getElementById("regError");
      if (!name || !email || !password) { err.textContent = "All fields required"; err.style.display = "block"; return; }
      try {
        const res = await fetch("/api/auth/register", {
          method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email,password,name})
        });
        const data = await res.json();
        if (!res.ok) { err.textContent = data.error; err.style.display = "block"; return; }
        localStorage.setItem("token", data.token);
        window.location.href = "/dashboard";
      } catch { err.textContent = "Connection failed"; err.style.display = "block"; }
    });

    document.querySelectorAll("input").forEach(i => i.addEventListener("keydown", e => {
      if (e.key === "Enter") {
        if (document.getElementById("register-form").style.display !== "none") document.getElementById("registerBtn").click();
        else document.getElementById("loginBtn").click();
      }
    }));
  </script>
</body>
</html>
